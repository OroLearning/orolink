<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Reset Password — OroLink</title>
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#fafaf7;color:#1a1a1a;font-family:'DM Sans',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;-webkit-font-smoothing:antialiased}
.logo{display:flex;align-items:center;gap:12px;margin-bottom:40px;text-decoration:none;color:#1a1a1a}
.logo-mark{width:42px;height:42px;border-radius:11px;background:#E2FF00;display:flex;align-items:center;justify-content:center}
.logo-letter{color:#1a1a1a;font-weight:700;font-size:20px;line-height:1}
.logo-name{font-size:22px;font-weight:700;letter-spacing:-0.3px}
.card{max-width:400px;width:100%;background:#ffffff;border:1px solid #e8e8e3;border-radius:16px;padding:40px 36px;box-shadow:0 4px 24px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04)}
.accent-line{width:40px;height:3px;background:#E2FF00;border-radius:2px;margin-bottom:20px}
h1{font-size:20px;font-weight:700;margin-bottom:4px;letter-spacing:-0.3px}
.subtitle{color:#6b6b6b;font-size:14px;margin-bottom:28px;line-height:1.5}
.field{margin-bottom:18px}
.field label{display:block;font-size:13px;font-weight:500;color:#6b6b6b;margin-bottom:6px}
.field input{width:100%;padding:11px 14px;border-radius:10px;border:1.5px solid #e8e8e3;background:#fafaf7;color:#1a1a1a;font-family:'DM Sans',system-ui,sans-serif;font-size:15px;outline:none;transition:border-color 0.2s,box-shadow 0.2s}
.field input::placeholder{color:#999}
.field input:focus{border-color:#1a1a1a;box-shadow:0 0 0 3px rgba(26,26,26,0.06)}
.btn-primary{width:100%;padding:13px;border-radius:11px;background:#1a1a1a;color:#fff;font-family:'DM Sans',system-ui,sans-serif;font-size:15px;font-weight:600;border:none;cursor:pointer;margin-top:8px;transition:background 0.2s,transform 0.1s}
.btn-primary:hover{background:#333}
.btn-primary:active{transform:scale(0.99)}
.btn-primary:disabled{opacity:0.6;cursor:not-allowed;transform:none}
.msg{padding:10px 14px;border-radius:10px;margin-top:12px;font-size:13px;text-align:center;display:none}
.msg-ok{background:#f0fdf4;color:#166534;border:1px solid #bbf7d0;display:block}
.msg-err{background:#fef2f2;color:#dc2626;border:1px solid #fecaca;display:block}
.footer-link{text-align:center;margin-top:18px;font-size:14px;color:#6b6b6b}
.footer-link a{color:#1a1a1a;font-weight:600;text-decoration:none;border-bottom:1.5px solid #e8e8e3;transition:border-color 0.2s}
.footer-link a:hover{border-color:#1a1a1a}
@media(max-width:480px){.card{padding:32px 24px;border-radius:14px}.logo{margin-bottom:32px}}
</style>
</head>
<body>
<a href="/" class="logo"><div class="logo-mark"><span class="logo-letter">O</span></div><span class="logo-name">OroLink</span></a>
<div class="card">
<div class="accent-line"></div>
<h1>Reset your password</h1>
<p class="subtitle">Enter your email and we'll send you a reset link.</p>
<div class="field"><label>Email</label><input type="email" id="email" placeholder="you@email.com"></div>
<div class="msg" id="msg"></div>
<button class="btn-primary" id="btn" onclick="sendReset()">Send reset link</button>
<p class="footer-link"><a href="/login.html">Back to login</a></p>
</div>

<!-- Supabase JS SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://paxggcgrvloxibtgphyo.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBheGdnY2dydmxveGlidGdwaHlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxMzE1NTgsImV4cCI6MjA4ODcwNzU1OH0.fLKHMZgbjsUEcE0UQcPIRYIHRzhTLjw40X5VGIG6af8';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function sendReset() {
  const msg = document.getElementById('msg');
  const btn = document.getElementById('btn');
  const email = document.getElementById('email').value.trim();
  msg.style.display = 'none';

  if (!email) {
    msg.style.display = 'block';
    msg.style.background = '#fef2f2';
    msg.style.color = '#dc2626';
    msg.style.border = '1px solid #fecaca';
    msg.textContent = 'Please enter your email.';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Sending…';

  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: 'https://link.orolearning.org/reset-password.html'
  });

  btn.disabled = false;
  btn.textContent = 'Send reset link';

  if (error) {
    msg.style.display = 'block';
    msg.style.background = '#fef2f2';
    msg.style.color = '#dc2626';
    msg.style.border = '1px solid #fecaca';
    msg.textContent = error.message;
    return;
  }

  // Always show success
  msg.style.display = 'block';
  msg.style.background = '#f0fdf4';
  msg.style.color = '#166534';
  msg.style.border = '1px solid #bbf7d0';
  msg.textContent = 'Reset link sent! Check your inbox (and spam folder).';
}

// Enter key support
document.getElementById('email').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') sendReset();
});
</script>
</body>
</html>
