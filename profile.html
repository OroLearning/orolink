.link-title{flex:1;text-align:center;padding-right:28px}
.footer{position:fixed;bottom:0;left:0;right:0;text-align:center;padding:12px;font-size:12px;opacity:0.6}
.footer a{text-decoration:none}

// ─── SOCIAL PLATFORM MAP ───
const socialMap = {
  social_tiktok:    { url: 'https://tiktok.com/@',    icon: 'tiktok' },
  social_instagram: { url: 'https://instagram.com/',   icon: 'instagram' },
  social_youtube:   { url: 'https://youtube.com/@',    icon: 'youtube' },
  social_twitter:   { url: 'https://x.com/',           icon: 'link' },
  social_facebook:  { url: 'https://facebook.com/',    icon: 'globe' }
};

// ─── EXTRACT USERNAME FROM URL ───
function getUsername() {
  // Method 1: Direct path /@username (works with Cloudflare Worker or .htaccess)
  const path = window.location.pathname;
  const pathMatch = path.match(/^\/@?([a-z0-9_]+)$/i);
  if (pathMatch) return pathMatch[1].toLowerCase();

  // Method 2: Query param ?u=username (GitHub Pages 404 redirect)
  const params = new URLSearchParams(window.location.search);
  const u = params.get('u');
  if (u) return u.toLowerCase();

  return null;
}

// ─── DETECT DEVICE ───
function getDevice() {
  return /Mobile|Android|iPhone/i.test(navigator.userAgent) ? 'mobile' : 'desktop';
}

// ─── ESCAPE HTML ───
function esc(str) {
  const d = document.createElement('div');
  d.textContent = str || '';
  return d.innerHTML;
}

// ─── RENDER PROFILE ───
async function loadProfile() {
  const username = getUsername();
  if (!username) { showNotFound('Invalid URL'); return; }

  // Try RPC function first, fallback to direct query
  let user = null;
  let userLinks = [];

  const { data: rpcData, error: rpcError } = await sb.rpc('get_public_profile', { p_username: username });

  if (!rpcError && rpcData) {
    // RPC returned data — format depends on your function
    if (Array.isArray(rpcData) && rpcData.length > 0) {
      user = rpcData[0];
    } else if (rpcData && !Array.isArray(rpcData)) {
      user = rpcData;
    }
  }

  // Fallback: direct query if RPC fails or returns nothing
  if (!user) {
    const { data: profileData } = await sb.from('orolink_profiles')
      .select('*')
      .eq('username', username)
      .single();
    user = profileData;
  }

  if (!user) { showNotFound(username); return; }

  // Load links
  const { data: links } = await sb.from('orolink_links')
    .select('*')
    .eq('user_id', user.id)
    .eq('is_active', true)
    .order('position', { ascending: true });
  userLinks = links || [];

  // Apply theme
  const t = themes[user.theme] || themes['midnight'];
  const tc = user.custom_text_color || t.text;
  const bc = user.custom_btn_color || t.btn;
  const btc = user.custom_btn_text_color || t.btntxt;

  // Handle background: custom image, gradient, or solid
  if (user.theme === 'custom' && user.custom_bg_url) {
    document.body.style.background = '#0f0f0f';
    document.body.style.backgroundImage = 'url(' + user.custom_bg_url + ')';
    document.body.style.backgroundSize = 'cover';
    document.body.style.backgroundPosition = 'center';
    document.body.style.backgroundAttachment = 'fixed';
    // Add overlay for readability
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:0;pointer-events:none';
    document.body.appendChild(overlay);
    document.querySelector('.container').style.position = 'relative';
    document.querySelector('.container').style.zIndex = '1';
  } else if (t.gradient) {
    document.body.style.background = t.bg;
  } else {
    document.body.style.background = user.custom_bg || t.bg;
  }
  document.body.style.color = tc;

  // Update page title & meta
  const displayName = user.display_name || '@' + user.username;
  document.title = displayName + ' | OroLink';
  updateMeta('description', user.bio || '');
  updateMeta('og:title', displayName);
  updateMeta('og:description', user.bio || '');

  // Build avatar
  let avatarHtml;
  if (user.avatar_url) {
    avatarHtml = '<div class="avatar"><img src="' + esc(user.avatar_url) + '" alt="' + esc(displayName) + '" style="border:3px solid ' + bc + '"></div>';
  } else {
    avatarHtml = '<div class="avatar"><div class="avatar-placeholder" style="background:' + bc + ';color:' + btc + '">' + (user.username || 'U').charAt(0).toUpperCase() + '</div></div>';
  }

  // Build social links
  let socialsHtml = '';
  for (const key in socialMap) {
    const handle = user[key];
    if (handle) {
      const s = socialMap[key];
      socialsHtml += '<a href="' + s.url + esc(handle) + '" target="_blank" rel="noopener" style="color:' + tc + '">' + icons[s.icon] + '</a>';
    }
  }

  // Build link buttons
  let linksHtml = '';
  userLinks.forEach(link => {
    linksHtml += '<a href="' + esc(link.url) + '" class="link-btn" target="_blank" rel="noopener" data-link-id="' + link.id + '" style="background:' + bc + ';color:' + btc + '">'
      + '<span class="link-icon">' + (icons[link.icon] || icons['link']) + '</span>'
      + '<span class="link-title">' + esc(link.title) + '</span>'
      + '</a>';
  });

  if (!userLinks.length) {
    linksHtml = '<p style="opacity:0.5;margin-top:20px">No links yet</p>';
  }

  // Render
  const container = document.getElementById('profileContainer');
  container.innerHTML = avatarHtml
    + '<div class="name">' + esc(displayName) + '</div>'
    + (user.bio ? '<div class="bio">' + esc(user.bio) + '</div>' : '')
    + (socialsHtml ? '<div class="socials">' + socialsHtml + '</div>' : '')
    + linksHtml;

  // Style promo bar and footer
  const promoBar = document.getElementById('promoBar');
  promoBar.style.display = 'block';
  promoBar.style.background = bc + '22';
  promoBar.style.borderTop = '1px solid ' + bc + '33';
  promoBar.querySelector('a').style.color = bc;

  const footerLinks = document.querySelectorAll('#footerBar a');
  footerLinks.forEach(a => a.style.color = tc);

  // ─── TRACK VIEW ───
  trackView(user.id);

  // ─── TRACK LINK CLICKS ───
  container.querySelectorAll('.link-btn[data-link-id]').forEach(btn => {
    btn.addEventListener('click', function(e) {
      const linkId = this.getAttribute('data-link-id');
      trackClick(user.id, linkId);
    });
  });
}

// ─── TRACK VIEW (anonymous allowed) ───
async function trackView(userId) {
  // Insert analytics event
  await sb.from('orolink_analytics').insert({
    user_id: userId,
    event_type: 'view',
    referrer: document.referrer || '',
    device: getDevice()
  });

  // Increment profile views counter
  await sb.rpc('increment_profile_views', { p_user_id: userId });
}

// ─── TRACK CLICK (anonymous allowed) ───
async function trackClick(userId, linkId) {
  await sb.from('orolink_analytics').insert({
    user_id: userId,
    link_id: linkId,
    event_type: 'click',
    referrer: document.referrer || '',
    device: getDevice()
  });

  await sb.rpc('increment_link_clicks', { p_link_id: linkId });
}

// ─── NOT FOUND ───
function showNotFound(username) {
  document.body.style.background = '#0f0f0f';
  document.body.style.color = '#ffffff';
  document.title = 'Not Found | OroLink';
  document.getElementById('profileContainer').innerHTML =
    '<div class="not-found">'
    + '<h1>@' + esc(username) + '</h1>'
    + '<p>This page doesn\'t exist yet.</p>'
    + '<a href="/signup.html?u=' + esc(username) + '" style="background:#E2FF00;color:#1a1a1a">Claim this username</a>'
    + '</div>';
}

// ─── HELPER: Update meta tags ───
function updateMeta(name, content) {
  let tag = document.querySelector('meta[name="' + name + '"], meta[property="' + name + '"]');
  if (!tag) {
    tag = document.createElement('meta');
    if (name.startsWith('og:')) tag.setAttribute('property', name);
    else tag.setAttribute('name', name);
    document.head.appendChild(tag);
  }
  tag.setAttribute('content', content);
}

// Boot
loadProfile();
</script>
