<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Set New Password — OroLink</title>
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#fafaf7;color:#1a1a1a;font-family:'DM Sans',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;-webkit-font-smoothing:antialiased}
.logo{display:flex;align-items:center;gap:12px;margin-bottom:40px;text-decoration:none;color:#1a1a1a}
.logo-mark{width:42px;height:42px;border-radius:11px;background:#E2FF00;display:flex;align-items:center;justify-content:center}
.logo-letter{color:#1a1a1a;font-weight:700;font-size:20px;line-height:1}
.logo-name{font-size:22px;font-weight:700;letter-spacing:-0.3px}
.card{max-width:400px;width:100%;background:#ffffff;border:1px solid #e8e8e3;border-radius:16px;padding:40px 36px;box-shadow:0 4px 24px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04)}
.accent-line{width:40px;height:3px;background:#E2FF00;border-radius:2px;margin-bottom:20px}
h1{font-size:20px;font-weight:700;margin-bottom:4px;letter-spacing:-0.3px}
.subtitle{color:#6b6b6b;font-size:14px;margin-bottom:28px;line-height:1.5}
.field{margin-bottom:18px}
.field label{display:block;font-size:13px;font-weight:500;color:#6b6b6b;margin-bottom:6px}
.field input{width:100%;padding:11px 14px;border-radius:10px;border:1.5px solid #e8e8e3;background:#fafaf7;color:#1a1a1a;font-family:'DM Sans',system-ui,sans-serif;font-size:15px;outline:none;transition:border-color 0.2s,box-shadow 0.2s}
.field input::placeholder{color:#999}
.field input:focus{border-color:#1a1a1a;box-shadow:0 0 0 3px rgba(26,26,26,0.06)}
.btn-primary{width:100%;padding:13px;border-radius:11px;background:#1a1a1a;color:#fff;font-family:'DM Sans',system-ui,sans-serif;font-size:15px;font-weight:600;border:none;cursor:pointer;margin-top:8px;transition:background 0.2s,transform 0.1s}
.btn-primary:hover{background:#333}
.btn-primary:active{transform:scale(0.99)}
.btn-primary:disabled{opacity:0.6;cursor:not-allowed;transform:none}
.msg{padding:10px 14px;border-radius:10px;margin-top:12px;font-size:13px;text-align:center;display:none}
.msg-ok{background:#f0fdf4;color:#166534;border:1px solid #bbf7d0;display:block}
.msg-err{background:#fef2f2;color:#dc2626;border:1px solid #fecaca;display:block}
.footer-link{text-align:center;margin-top:18px;font-size:14px;color:#6b6b6b}
.footer-link a{color:#1a1a1a;font-weight:600;text-decoration:none;border-bottom:1.5px solid #e8e8e3;transition:border-color 0.2s}
.footer-link a:hover{border-color:#1a1a1a}
.error-state{text-align:center;padding:20px 0}
.error-state p{color:#6b6b6b;font-size:14px;margin-top:12px;line-height:1.5}
@media(max-width:480px){.card{padding:32px 24px;border-radius:14px}.logo{margin-bottom:32px}}
</style>
</head>
<body>
<a href="/" class="logo"><div class="logo-mark"><span class="logo-letter">O</span></div><span class="logo-name">OroLink</span></a>
<div class="card">
<div class="accent-line"></div>

<!-- Loading state while Supabase processes the token -->
<div id="loading">
<h1>Verifying your link…</h1>
<p class="subtitle">Please wait a moment.</p>
</div>

<!-- Error state if token is invalid/expired -->
<div id="errorState" style="display:none">
<div class="error-state">
<h1>Link expired or invalid</h1>
<p>This reset link may have expired or already been used. Please request a new one.</p>
</div>
<a href="/forgot.html" class="btn-primary" style="display:block;text-align:center;text-decoration:none;margin-top:20px">Request new reset link</a>
</div>

<!-- Success state: user can set new password -->
<div id="resetForm" style="display:none">
<h1>Set new password</h1>
<p class="subtitle">Choose a strong password for your account.</p>
<div class="field"><label>New password</label><input type="password" id="newpass" placeholder="Min 8 characters"></div>
<div class="field"><label>Confirm password</label><input type="password" id="confirmpass" placeholder="Repeat your password"></div>
<div class="msg" id="msg"></div>
<button class="btn-primary" id="btn" onclick="updatePassword()">Update password</button>
</div>

<p class="footer-link"><a href="/login.html">Back to login</a></p>
</div>

<!-- Supabase JS SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://paxggcgrvloxibtgphyo.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBheGdnY2dydmxveGlidGdwaHlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxMzE1NTgsImV4cCI6MjA4ODcwNzU1OH0.fLKHMZgbjsUEcE0UQcPIRYIHRzhTLjw40X5VGIG6af8';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// On page load, Supabase automatically processes the token from the URL hash
// The onAuthStateChange listener detects when the user is authenticated via the recovery token
sb.auth.onAuthStateChange(async (event, session) => {
  if (event === 'PASSWORD_RECOVERY') {
    // Token is valid, user is temporarily authenticated — show the reset form
    document.getElementById('loading').style.display = 'none';
    document.getElementById('resetForm').style.display = 'block';
  }
});

// Fallback: if no auth event fires after 5 seconds, show error
setTimeout(() => {
  const loading = document.getElementById('loading');
  if (loading.style.display !== 'none') {
    loading.style.display = 'none';
    document.getElementById('errorState').style.display = 'block';
  }
}, 5000);

async function updatePassword() {
  const msg = document.getElementById('msg');
  const btn = document.getElementById('btn');
  const newpass = document.getElementById('newpass').value;
  const confirmpass = document.getElementById('confirmpass').value;
  msg.style.display = 'none';

  if (!newpass || newpass.length < 8) {
    msg.style.display = 'block';
    msg.style.background = '#fef2f2';
    msg.style.color = '#dc2626';
    msg.style.border = '1px solid #fecaca';
    msg.textContent = 'Password must be at least 8 characters.';
    return;
  }
  if (newpass !== confirmpass) {
    msg.style.display = 'block';
    msg.style.background = '#fef2f2';
    msg.style.color = '#dc2626';
    msg.style.border = '1px solid #fecaca';
    msg.textContent = 'Passwords do not match.';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Updating…';

  const { error } = await sb.auth.updateUser({ password: newpass });

  if (error) {
    btn.disabled = false;
    btn.textContent = 'Update password';
    msg.style.display = 'block';
    msg.style.background = '#fef2f2';
    msg.style.color = '#dc2626';
    msg.style.border = '1px solid #fecaca';
    msg.textContent = error.message;
    return;
  }

  // Hide the form, show full-page success
  document.getElementById('resetForm').style.display = 'none';
  document.querySelector('.footer-link').style.display = 'none';
  const container = document.querySelector('.card');
  container.innerHTML = '<div style="text-align:center;padding:20px 0">'
    + '<div style="width:56px;height:56px;border-radius:50%;background:rgba(226,255,0,0.15);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:28px">✓</div>'
    + '<h1 style="font-size:24px;margin-bottom:8px">Password updated!</h1>'
    + '<p style="color:#6b6b6b;font-size:15px;margin-bottom:24px">Your password has been changed successfully.</p>'
    + '<a href="/login.html" style="display:inline-block;padding:14px 32px;background:#1a1a1a;color:#fff;border-radius:12px;font-weight:700;font-size:15px;text-decoration:none">Log in with new password</a>'
    + '</div>';
}

// Enter key support
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && document.getElementById('resetForm').style.display !== 'none') {
    updatePassword();
  }
});
</script>
</body>
</html>
